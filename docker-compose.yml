services:
  db:
    image: postgres:16-alpine
    container_name: pet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pet}
      POSTGRES_DB: ${POSTGRES_DB:-pet_db}
    ports:
      # Только localhost сервера — для pgAdmin через SSH-туннель, не в интернет
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/src/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pet} -d ${POSTGRES_DB:-pet_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pet-network

  api:
    build:
      context: ./apps/api
      target: production
    container_name: pet-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-pet}:${POSTGRES_PASSWORD:-pet}@db:5432/${POSTGRES_DB:-pet_db}
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-pet}
      POSTGRES_DB: ${POSTGRES_DB:-pet_db}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-too-in-production}
      UPLOAD_DIR: /app/uploads
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
      PUBLIC_APP_URL: https://${DOMAIN}
      RUSENDER_API_KEY: ${RUSENDER_API_KEY:-rs_ck_v1_placeholder}
      RUSENDER_KEY_ID: ${RUSENDER_KEY_ID:-0}
      RUSENDER_FROM_EMAIL: ${RUSENDER_FROM_EMAIL:-noreply@example.com}
      RUSENDER_FROM_NAME: ${RUSENDER_FROM_NAME:-Домашняя карта желаний}
      RUSENDER_API_BASE: ${RUSENDER_API_BASE:-https://api.rusender.ru/api/v1/external-mails/send}
      RESET_TOKEN_TTL_MIN: ${RESET_TOKEN_TTL_MIN:-60}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pet-network

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: pet-web
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api
    networks:
      - pet-network

  caddy:
    image: caddy:2-alpine
    container_name: pet-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - pet-network

networks:
  pet-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:
