<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('auth_access_token');
          document.documentElement.classList.add(t ? 'is-authed' : 'is-guest');
        } catch (e) {
          document.documentElement.classList.add('is-guest');
        }
      })();
    </script>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#ffb6c1" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
    <title>Новый пароль · Домашняя карта желаний</title>
    <link rel="stylesheet" href="../../assets/css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="header-inner">
          <a href="/" class="logo">
            <div class="logo-mark">W</div>
            <div>
              <div class="logo-text-main">Домашняя карта желаний</div>
              <div class="logo-text-sub">Общие цели и личные хотелки</div>
            </div>
          </a>
        </div>
      </header>

      <main class="app-main">
        <section class="page">
          <header class="page-header">
            <div class="page-title-group">
              <div class="page-eyebrow">Восстановление доступа</div>
              <h1 class="page-title">Задайте новый пароль</h1>
              <p class="page-subtitle" id="reset-subtitle">
                Придумайте новый пароль для вашего аккаунта
              </p>
            </div>
          </header>

          <section class="stack-lg" aria-label="Форма нового пароля">
            <div class="form-card" id="reset-form-card">
              <form class="form-grid" id="reset-form" novalidate>
                <div class="form-row-inline">
                  <div class="form-field" data-field="password">
                    <label class="form-label" for="reset-password">Новый пароль</label>
                    <div class="password-input-wrap">
                      <input
                        class="form-input"
                        id="reset-password"
                        type="password"
                        autocomplete="new-password"
                        minlength="6"
                        required
                        placeholder="Не менее 6 символов"
                      />
                      <button
                        type="button"
                        class="password-toggle"
                        data-password-toggle="reset-password"
                        aria-label="Показать пароль"
                      >
                        Показать
                      </button>
                    </div>
                    <p class="form-field-error" data-field-error="password" aria-live="polite"></p>
                  </div>
                  <div class="form-field" data-field="password2">
                    <label class="form-label" for="reset-password2">Повторите пароль</label>
                    <div class="password-input-wrap">
                      <input
                        class="form-input"
                        id="reset-password2"
                        type="password"
                        autocomplete="new-password"
                        minlength="6"
                        required
                        placeholder="Ещё раз"
                      />
                      <button
                        type="button"
                        class="password-toggle"
                        data-password-toggle="reset-password2"
                        aria-label="Показать пароль"
                      >
                        Показать
                      </button>
                    </div>
                    <p class="form-field-error" data-field-error="password2" aria-live="polite"></p>
                  </div>
                </div>
                <div id="reset-message" class="form-error" hidden></div>
                <div class="form-actions">
                  <a href="/pages/auth/login" class="btn btn--ghost">Ко входу</a>
                  <button class="btn btn--primary" type="submit" id="reset-submit-btn">
                    Сохранить пароль
                  </button>
                </div>
              </form>
            </div>
            <div class="form-card" id="reset-invalid-card" hidden>
              <p class="page-subtitle" style="margin: 0;">
                Ссылка недействительна или истекла. Запросите сброс пароля снова.
              </p>
              <div class="form-actions" style="margin-top: 1rem;">
                <a href="/pages/auth/forgot-password" class="btn btn--primary">Запросить новую ссылку</a>
              </div>
            </div>
          </section>
        </section>
      </main>

      <footer class="app-footer">
        Домашняя карта желаний · Общие цели и личные хотелки
      </footer>
    </div>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/data.js"></script>
    <script src="/assets/js/app.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token') || '';

      const form = document.getElementById('reset-form');
      const formCard = document.getElementById('reset-form-card');
      const invalidCard = document.getElementById('reset-invalid-card');
      const messageEl = document.getElementById('reset-message');
      const submitBtn = document.getElementById('reset-submit-btn');
      const passwordInput = document.getElementById('reset-password');
      const password2Input = document.getElementById('reset-password2');

      function clearFieldError(fieldName) {
        const wrapper = document.querySelector(`[data-field="${fieldName}"]`);
        const errorEl = document.querySelector(`[data-field-error="${fieldName}"]`);
        const input = fieldName === 'password' ? passwordInput : password2Input;
        if (wrapper) wrapper.classList.remove('form-field--invalid');
        if (errorEl) errorEl.textContent = '';
        if (input) {
          input.classList.remove('form-input--invalid');
          input.removeAttribute('aria-invalid');
        }
      }

      function setFieldError(fieldName, message) {
        const wrapper = document.querySelector(`[data-field="${fieldName}"]`);
        const errorEl = document.querySelector(`[data-field-error="${fieldName}"]`);
        const input = fieldName === 'password' ? passwordInput : password2Input;
        if (!wrapper || !errorEl || !input) return;
        wrapper.classList.add('form-field--invalid');
        errorEl.textContent = message;
        input.classList.add('form-input--invalid');
        input.setAttribute('aria-invalid', 'true');
      }

      function showMessage(text, isSuccess) {
        messageEl.hidden = false;
        messageEl.textContent = text;
        messageEl.classList.toggle('form-error--success', isSuccess);
      }

      function showInvalidLink() {
        formCard.hidden = true;
        invalidCard.hidden = false;
      }

      async function initResetPage() {
        if (!token.trim()) {
          showInvalidLink();
          return;
        }
        try {
          const { valid } = await validateResetToken(token);
          if (!valid) {
            showInvalidLink();
          }
        } catch {
          showInvalidLink();
        }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearFieldError('password');
        clearFieldError('password2');
        messageEl.hidden = true;

        const password = passwordInput.value;
        const password2 = password2Input.value;
        let hasError = false;

        if (password.length < 6) {
          setFieldError('password', 'Пароль должен быть не менее 6 символов');
          hasError = true;
        }
        if (password !== password2) {
          setFieldError('password2', 'Пароли не совпадают');
          hasError = true;
        }
        if (hasError) {
          showMessage('Проверьте поля, отмеченные красным', false);
          return;
        }

        submitBtn.disabled = true;
        const originalText = submitBtn.textContent;
        submitBtn.textContent = 'Сохранение...';

        try {
          const result = await submitPasswordReset(token, password);
          showMessage('✓ ' + (result.message || 'Пароль обновлён! Перенаправление...'), true);
          setTimeout(() => {
            window.location.href = APP_ROUTES.login;
          }, 2000);
        } catch (error) {
          let errorMessage = 'Не удалось обновить пароль';
          if (error.message) errorMessage = error.message;
          else if (error.status === 400) {
            errorMessage = 'Ссылка недействительна или истекла';
            showInvalidLink();
          } else if (error.status >= 500) errorMessage = 'Ошибка сервера. Попробуйте позже';
          else if (error.message === 'Failed to fetch') {
            errorMessage = 'Не удалось подключиться к серверу (' + API_CONFIG.baseURL + ')';
          }
          showMessage('✗ ' + errorMessage, false);
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      });

      initResetPage();
      redirectIfAuthenticated(APP_ROUTES.goals);
    </script>
  </body>
</html>
