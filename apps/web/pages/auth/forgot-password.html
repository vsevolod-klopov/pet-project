<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('auth_access_token');
          document.documentElement.classList.add(t ? 'is-authed' : 'is-guest');
        } catch (e) {
          document.documentElement.classList.add('is-guest');
        }
      })();
    </script>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#ffb6c1" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
    <title>Сброс пароля · Домашняя карта желаний</title>
    <link rel="stylesheet" href="../../assets/css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="header-inner">
          <a href="/" class="logo">
            <div class="logo-mark">W</div>
            <div>
              <div class="logo-text-main">Домашняя карта желаний</div>
              <div class="logo-text-sub">Общие цели и личные хотелки</div>
            </div>
          </a>
        </div>
      </header>

      <main class="app-main">
        <section class="page">
          <header class="page-header">
            <div class="page-title-group">
              <div class="page-eyebrow">Восстановление доступа</div>
              <h1 class="page-title">Забыли пароль?</h1>
              <p class="page-subtitle">
                Укажите email — мы отправим ссылку для сброса пароля
              </p>
            </div>
          </header>

          <section class="stack-lg" aria-label="Форма сброса пароля">
            <div class="form-card">
              <form class="form-grid" id="forgot-form">
                <div class="form-field">
                  <label class="form-label" for="forgot-email">E-mail</label>
                  <input
                    class="form-input"
                    id="forgot-email"
                    type="email"
                    name="email"
                    autocomplete="email"
                    required
                    placeholder="you@example.com"
                  />
                </div>
                <div id="forgot-message" class="form-error" hidden></div>
                <div class="form-actions">
                  <a href="/pages/auth/login" class="btn btn--ghost">Назад ко входу</a>
                  <button class="btn btn--primary" type="submit" id="forgot-submit-btn">
                    Отправить ссылку
                  </button>
                </div>
              </form>
            </div>
          </section>
        </section>
      </main>

      <footer class="app-footer">
        Домашняя карта желаний · Общие цели и личные хотелки
      </footer>
    </div>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/data.js"></script>
    <script src="/assets/js/app.js"></script>
    <script>
      const form = document.getElementById('forgot-form');
      const messageEl = document.getElementById('forgot-message');
      const submitBtn = document.getElementById('forgot-submit-btn');

      function showMessage(text, isSuccess) {
        messageEl.hidden = false;
        messageEl.textContent = text;
        messageEl.classList.toggle('form-error--success', isSuccess);
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('forgot-email').value.trim();
        messageEl.hidden = true;
        submitBtn.disabled = true;
        const originalText = submitBtn.textContent;
        submitBtn.textContent = 'Отправка...';

        try {
          if (!email) {
            throw new Error('Укажите email');
          }
          const result = await requestPasswordReset(email);
          showMessage(result.message || 'Если этот email зарегистрирован, мы отправили ссылку для сброса пароля.', true);
          form.querySelector('#forgot-email').disabled = true;
          submitBtn.hidden = true;
        } catch (error) {
          let errorMessage = 'Не удалось отправить запрос';
          if (error.message) errorMessage = error.message;
          else if (error.status >= 500) errorMessage = 'Ошибка сервера. Попробуйте позже';
          else if (error.message === 'Failed to fetch') {
            errorMessage = 'Не удалось подключиться к серверу (' + API_CONFIG.baseURL + ')';
          }
          showMessage('✗ ' + errorMessage, false);
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      });

      redirectIfAuthenticated(APP_ROUTES.goals);
    </script>
  </body>
</html>
