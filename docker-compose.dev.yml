# Development: hot-reload API + live static files via nginx volume
services:
  db:
    image: postgres:16-alpine
    container_name: pet-db-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pet}
      POSTGRES_DB: ${POSTGRES_DB:-pet_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./apps/api/src/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pet} -d ${POSTGRES_DB:-pet_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pet-network

  api:
    build:
      context: ./apps/api
      target: development
    container_name: pet-api-dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-pet}:${POSTGRES_PASSWORD:-pet}@db:5432/${POSTGRES_DB:-pet_db}
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-pet}
      POSTGRES_DB: ${POSTGRES_DB:-pet_db}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      UPLOAD_DIR: /app/uploads
      CHOKIDAR_USEPOLLING: "true"
      DOMAIN: ${DOMAIN:-localhost}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:8080}
      RUSENDER_API_KEY: ${RUSENDER_API_KEY:-rs_ck_v1_placeholder}
      RUSENDER_KEY_ID: ${RUSENDER_KEY_ID:-0}
      RUSENDER_FROM_EMAIL: ${RUSENDER_FROM_EMAIL:-noreply@example.com}
      RUSENDER_FROM_NAME: ${RUSENDER_FROM_NAME:-Домашняя карта желаний}
      RUSENDER_API_BASE: ${RUSENDER_API_BASE:-https://api.rusender.ru/api/v1/external-mails/send}
      RESET_TOKEN_TTL_MIN: ${RESET_TOKEN_TTL_MIN:-60}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/scripts:/app/scripts
      - uploads_data_dev:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pet-network

  web:
    image: nginx:1.27-alpine
    container_name: pet-web-dev
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./apps/web:/usr/share/nginx/html:ro
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - pet-network

networks:
  pet-network:
    driver: bridge

volumes:
  postgres_data_dev:
  uploads_data_dev:
