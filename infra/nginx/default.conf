server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # API proxy (same origin — no CORS issues in Docker)
    location /api/ {
        proxy_pass http://api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 6m;
    }

    location /auth/ {
        proxy_pass http://api:3000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://api:3000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        client_max_body_size 6m;
    }

    location /health {
        proxy_pass http://api:3000/health;
    }

    # Home served directly at "/" (no internal /index.html rewrite → avoids redirect loop)
    location = / {
        try_files /index.html =404;
    }

    # Home aliases → "/"
    location = /index.html { return 301 /; }
    location = /index { return 301 /; }

    # Legacy flat URLs → clean pages structure
    location = /goals.html { return 301 /pages/goals; }
    location = /goal-detail.html { return 301 /pages/goal-detail; }
    location = /family.html { return 301 /pages/family; }
    location = /wishlist.html { return 301 /pages/wishlist; }
    location = /my-wishlist.html { return 301 /pages/my-wishlist; }
    location = /login.html { return 301 /pages/auth/login; }
    location = /register.html { return 301 /pages/auth/register; }
    location = /styles.css { return 301 /assets/css/styles.css; }

    # Any remaining *.html → clean URL without extension (301)
    location ~ ^/(.*)\.html$ {
        return 301 /$1;
    }

    # Static frontend with extensionless routing: /pages/goals → goals.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
