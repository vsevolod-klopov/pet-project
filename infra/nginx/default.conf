server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Static frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy (same origin — no CORS issues in Docker)
    location /api/ {
        proxy_pass http://api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 6m;
    }

    location /auth/ {
        proxy_pass http://api:3000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://api:3000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        client_max_body_size 6m;
    }

    location /health {
        proxy_pass http://api:3000/health;
    }

    # Legacy flat URLs → new structure
    location = /goals.html { return 302 /pages/goals.html; }
    location = /goal-detail.html { return 302 /pages/goal-detail.html; }
    location = /family.html { return 302 /pages/family.html; }
    location = /wishlist.html { return 302 /pages/wishlist.html; }
    location = /my-wishlist.html { return 302 /pages/my-wishlist.html; }
    location = /login.html { return 302 /pages/auth/login.html; }
    location = /register.html { return 302 /pages/auth/register.html; }
    location = /styles.css { return 302 /assets/css/styles.css; }
}
